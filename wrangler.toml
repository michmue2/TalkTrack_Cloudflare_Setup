name            = "voice-cost-tracker"
main            = "src/index.ts"
compatibility_date = "2024-09-23"

# After running `wrangler d1 create voice-cost-tracker-db`,
# replace the placeholder below with the returned database_id.
[[d1_databases]]
binding       = "DB"
database_name = "voice-cost-tracker-db"
database_id   = "[pasteyour id here]"

